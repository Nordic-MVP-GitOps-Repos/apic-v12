# CA Issuer for Valkey TLS certificates
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: valkey-ca-issuer
spec:
  selfSigned: {}
---
# CA Certificate for Valkey
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: valkey-ca
spec:
  isCA: true
  commonName: ValkeyCA
  secretName: valkey-ca-secret
  duration: 8760h  # 365 days
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: valkey-ca-issuer
    kind: Issuer
---
# CA-based Issuer for Valkey server certificates
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: valkey-issuer
spec:
  ca:
    secretName: valkey-ca-secret