# Server Certificate for Valkey
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: valkey-tls
spec:
  secretTemplate:
    annotations:
      cert-utils-operator.redhat-cop.io/generate-cert-info: "true"
  secretName: valkey-tls-secret
  duration: 8760h  # 365 days
  renewBefore: 720h  # 30 days
  commonName: valkey.apic.svc.cluster.local
  usages:
    - digital signature
    - key encipherment
  dnsNames:
    - valkey.apic.svc.cluster.local
    - valkey.apic.svc
    - valkey-headless.apic.svc.cluster.local
    - valkey-headless.apic.svc
    - valkey-headless
    - valkey
    - valkey-leader-headless.apic.svc.cluster.local
    - valkey-leader-headless.apic.svc
    - valkey-leader-headless
    - valkey-leader.apic.svc.cluster.local
    - valkey-leader.apic.svc
    - valkey-leader
  privateKey:
    algorithm: RSA
    size: 2048
  issuerRef:
    name: valkey-issuer
    kind: Issuer